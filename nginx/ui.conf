# Reverse-proxy APIs so the UI uses same-origin requests (http://localhost:8080/api/...)
# and avoids browser issues with direct :5101 / :5105 / :5106.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=30s;

    location /api/booking/ {
        set $booking_upstream http://booking:5101;
        proxy_pass $booking_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/loyalty/ {
        set $loyalty_upstream http://loyalty:5105;
        proxy_pass $loyalty_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /api/notification/ {
        set $notification_upstream http://notification:5106;
        proxy_pass $notification_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /api/flight/ {
        set $flight_upstream http://flight:5102;
        proxy_pass $flight_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /api/hotel/ {
        set $hotel_upstream http://hotel:5103;
        proxy_pass $hotel_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /api/graphql/ {
        set $graphql_upstream http://graphql:5110;
        proxy_pass $graphql_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
