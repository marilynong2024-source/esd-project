# Reverse-proxy APIs so the UI uses same-origin requests (http://localhost:8080/api/...)
# and avoids browser issues with direct :5101 / :5105 / :5106.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=30s;

    # Variable proxy_pass does not strip the location prefix; rewrite so backends see /path not /api/.../path.
    # `set` must come before `rewrite ... break` (break skips later rewrite-phase directives including set).
    location /api/booking/ {
        set $booking_upstream http://booking:5101;
        rewrite ^/api/booking/(.*)$ /$1 break;
        proxy_pass $booking_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/loyalty/ {
        set $loyalty_upstream http://loyalty:5105;
        rewrite ^/api/loyalty/(.*)$ /$1 break;
        proxy_pass $loyalty_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /api/notification/ {
        set $notification_upstream http://notification:5106;
        rewrite ^/api/notification/(.*)$ /$1 break;
        proxy_pass $notification_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /api/flight/ {
        set $flight_upstream http://flight:5102;
        rewrite ^/api/flight/(.*)$ /$1 break;
        proxy_pass $flight_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /api/hotel/ {
        set $hotel_upstream http://hotel:5103;
        rewrite ^/api/hotel/(.*)$ /$1 break;
        proxy_pass $hotel_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /api/graphql/ {
        set $graphql_upstream http://graphql:5110;
        rewrite ^/api/graphql/(.*)$ /$1 break;
        proxy_pass $graphql_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /api/discount/ {
        set $discount_upstream http://discount:5112;
        rewrite ^/api/discount/(.*)$ /$1 break;
        proxy_pass $discount_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # Diagram endpoint: GET /bundle-price
    # Exposed via: GET http://localhost:8080/api/bundle-price?origin=...&destination=...
    location /api/bundle-price {
        set $bundle_upstream http://bundle-pricing:5111;
        rewrite ^/api/bundle-price/?$ /bundle-price break;
        proxy_pass $bundle_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
