version: "3.8"

services:
  booking:
    build:
      context: .
      dockerfile: booking/Dockerfile
    ports:
      - "5101:5101"
    environment:
      DB_URL: ${BOOKING_DB_URL:-mysql+pymysql://travel_user:travel_pass@booking-db:3306/travel_booking}
      FLIGHT_URL: http://flight:5102/flight
      HOTEL_URL: http://hotel:5103/hotel
      PAYMENT_URL: http://payment:5104/payment
      LOYALTY_URL: http://loyalty:5105/loyalty
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      EXCHANGE_NAME: travel_topic
      EXCHANGE_TYPE: topic
      TRAVELLER_PROFILE_BASE_URL: ${TRAVELLER_PROFILE_BASE_URL:-}
      TRAVELLER_PROFILE_REQUIRED: ${TRAVELLER_PROFILE_REQUIRED:-false}
      FX_API_ENABLED: ${FX_API_ENABLED:-false}
      FX_API_URL: ${FX_API_URL:-}
      SKIP_CATALOG_VALIDATION: ${SKIP_CATALOG_VALIDATION:-false}
    depends_on:
      flight:
        condition: service_started
      hotel:
        condition: service_started
      payment:
        condition: service_started
      loyalty:
        condition: service_started
      rabbitmq:
        condition: service_started
      booking-db:
        condition: service_healthy

  account:
    build: ./account
    ports:
      - "5100:5100"

  flight:
    build: ./flight
    ports:
      - "5102:5102"

  hotel:
    build: ./hotel
    ports:
      - "5103:5103"

  payment:
    build: ./payment
    ports:
      - "5104:5104"

  loyalty:
    build: ./loyalty
    ports:
      - "5105:5105"

  notification:
    build: ./notification
    ports:
      - "5106:5106"
    environment:
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      EXCHANGE_NAME: travel_topic
      EXCHANGE_TYPE: topic
      QUEUE_NAME: Notification
      SMU_NOTIFICATION_ENABLED: ${SMU_NOTIFICATION_ENABLED:-false}
      SMU_NOTIFICATION_BASE_URL: ${SMU_NOTIFICATION_BASE_URL:-}
      SMU_NOTIFY_EMAIL_TO: ${SMU_NOTIFY_EMAIL_TO:-}
      SMU_NOTIFICATION_AUTH_HEADER: ${SMU_NOTIFICATION_AUTH_HEADER:-Authorization}
      SMU_NOTIFICATION_AUTH_VALUE: ${SMU_NOTIFICATION_AUTH_VALUE:-}
      TWILIO_ENABLED: ${TWILIO_ENABLED:-false}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      TWILIO_TO_NUMBER: ${TWILIO_TO_NUMBER:-}
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      # If another stack already uses 5672 / 15672 (e.g. rabbitmq-rabbitmq-1), these host ports avoid clashes.
      - "5674:5672"
      - "15673:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  booking-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-travel_booking}
      MYSQL_USER: ${MYSQL_USER:-travel_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-travel_pass}
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  ui:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./nginx/ui.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - booking
      - loyalty
      - notification

